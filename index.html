<html lang="zh-TW"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>姆姆國財政基金</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&amp;family=Inter:wght@500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f3ee;
      --card: rgba(255,255,255,.86);
      --text: #2d2520;
      --muted: #8a7f77;
      --line: rgba(90, 74, 62, .13);
      --brown: #7a4f35;
      --brown-dark: #513321;
      --green: #2f8f5b;
      --red: #d45b5b;
      --shadow: 0 16px 44px rgba(76, 54, 36, .12);
      --radius: 22px;
      --bottom-safe: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 212, 142, .42), transparent 32%),
        radial-gradient(circle at 92% 0%, rgba(255, 157, 143, .20), transparent 26%),
        linear-gradient(135deg, #fbf7ef 0%, #f2ede5 100%);
      padding: 14px 14px calc(22px + var(--bottom-safe));
    }

    .app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -1.1px;
      color: var(--brown-dark);
      line-height: 1.08;
    }

    .title-wrap p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    button, input, select, textarea {
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      border: 0;
      border-radius: 999px;
      min-height: 46px;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
      white-space: nowrap;
      font-size: 14px;
    }

    button:active { transform: scale(.98); }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--brown), var(--brown-dark));
      box-shadow: 0 12px 28px rgba(81, 51, 33, .24);
      width: 100%;
    }

    .btn-soft {
      color: var(--brown-dark);
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
    }

    .btn-danger {
      color: white;
      background: var(--red);
    }

    .balance-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
      position: relative;
      z-index: 2;
    }

    .balance-action {
      min-height: 42px;
      padding: 10px 14px;
      font-size: 14px;
    }

    .expense-panel,
    .income-panel {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(45, 37, 32, .46);
      backdrop-filter: blur(8px);
    }

    .expense-panel.show,
    .income-panel.show {
      display: flex;
    }

    .expense-modal,
    .income-modal {
      width: min(100%, 520px);
      max-height: 88vh;
      overflow: auto;
      margin: 0;
    }

    .expense-modal form,
    .income-modal form {
      width: 100%;
    }

    .expense-modal .btn-primary,
    .income-modal .btn-primary {
      margin-top: 4px;
    }

    .modal-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-title-row h2 {
      margin: 0;
      font-size: 20px;
      color: var(--brown-dark);
    }

    .modal-close {
      width: auto;
      min-height: 38px;
      padding: 8px 12px;
      background: rgba(122,79,53,.10);
      color: var(--brown-dark);
      box-shadow: none;
    }

    .summary-grid,
    .form-grid,
    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .summary-grid {
      margin-bottom: 12px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.72);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .mini-card {
      min-height: 108px;
      position: relative;
      overflow: hidden;
      padding: 15px 16px;
    }

    .mini-card::after {
      content: "";
      position: absolute;
      right: -38px;
      bottom: -48px;
      width: 116px;
      height: 116px;
      border-radius: 50%;
      background: rgba(122, 79, 53, .08);
    }

    .balance-card .value {
      font-size: 40px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .value {
      margin-top: 9px;
      font-size: 30px;
      font-weight: 900;
      color: var(--brown-dark);
      letter-spacing: -1px;
      line-height: 1;
      word-break: break-word;
    }

    .sub {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.45;
    }

    .cloud-status {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      position: relative;
      z-index: 2;
    }

    .cloud-status.ok { color: var(--green); }
    .cloud-status.warn { color: #b87816; }
    .cloud-status.error { color: var(--red); }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none !important;
    }

    .section-title {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 20px;
      color: var(--brown-dark);
    }

    form {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.78);
      border-radius: 16px;
      min-height: 48px;
      padding: 13px 14px;
      color: var(--text);
      outline: none;
      font-size: 16px;
      transition: .18s ease;
      text-align: left;
    }

    input[type="date"] {
      min-width: 100%;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="file"] {
      padding: 10px 12px;
      min-height: auto;
    }

    /* 移除金額輸入框右側上下箭頭 */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    input:focus, textarea:focus {
      border-color: rgba(122, 79, 53, .55);
      box-shadow: 0 0 0 4px rgba(122, 79, 53, .09);
    }

    textarea {
      resize: vertical;
      min-height: 76px;
      line-height: 1.55;
    }

    .hidden { display: none !important; }

    .photo-preview-wrap {
      display: none;
      gap: 8px;
      margin-top: 2px;
    }

    .photo-preview-wrap.show { display: grid; }

    .photo-preview {
      width: 100%;
      max-width: 180px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      object-fit: cover;
      aspect-ratio: 1 / 1;
      box-shadow: 0 10px 24px rgba(76,54,36,.10);
    }

    .preview-note {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .records {
      display: grid;
      gap: 10px;
    }

    .record {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
      padding: 14px;
      background: rgba(255,255,255,.70);
      border: 1px solid var(--line);
      border-radius: 20px;
    }

    .record-content {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .record-content.has-photo {
      grid-template-columns: minmax(0, 1fr) 92px;
    }

    .record-main {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .record-title {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
      font-weight: 900;
      color: var(--brown-dark);
      line-height: 1.45;
    }

    .record-title > span:first-child {
      width: 100%;
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 900;
    }

    .income { background: rgba(47,143,91,.13); color: var(--green); }
    .expense { background: rgba(212,91,91,.13); color: var(--red); }

    .record-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .record-bottom {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .amount {
      text-align: left;
      font-size: 22px;
      font-weight: 900;
      white-space: nowrap;
      line-height: 1.1;
    }

    .amount.plus { color: var(--green); }
    .amount.minus { color: var(--red); }

    .record-actions {
      display: flex;
      justify-content: flex-start;
      margin-top: 0;
    }

    .tiny-btn {
      min-height: 28px;
      padding: 5px 9px;
      font-size: 11px;
      background: rgba(212,91,91,.12);
      color: var(--red);
      box-shadow: none;
      position: relative;
      z-index: 3;
    }

    .photo-add-btn {
      min-height: 28px;
      padding: 5px 10px;
      font-size: 12px;
      background: rgba(122,79,53,.10);
      color: var(--brown-dark);
      box-shadow: none;
    }

    .record-photo-wrap {
      justify-self: end;
      align-self: center;
    }

    .record-photo {
      width: 86px;
      height: 86px;
      border-radius: 16px;
      margin-top: 0;
      border: 1px solid var(--line);
      display: block;
      object-fit: cover;
      cursor: pointer;
      background: rgba(255,255,255,.85);
      box-shadow: 0 8px 18px rgba(76,54,36,.10);
    }

    .empty {
      text-align: center;
      padding: 28px 16px;
      color: var(--muted);
      border: 1px dashed rgba(122, 79, 53, .22);
      border-radius: 22px;
      background: rgba(255,255,255,.45);
      font-weight: 700;
      line-height: 1.5;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(20, 14, 10, .72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
      backdrop-filter: blur(6px);
    }

    .lightbox.show {
      display: flex;
    }

    .lightbox-content {
      width: min(100%, 720px);
      display: grid;
      gap: 10px;
      justify-items: end;
    }

    .lightbox-close {
      width: auto;
      min-height: 40px;
      padding: 10px 14px;
      background: rgba(255,255,255,.95);
      color: var(--brown-dark);
      box-shadow: none;
    }

    .lightbox img {
      width: 100%;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 22px;
      background: white;
    }

    @media (min-width: 480px) {
      body { padding: 18px 18px calc(26px + var(--bottom-safe)); }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .title-wrap h1 { font-size: 36px; }
      .toolbar { grid-template-columns: 1fr 150px; }
      .section-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
    }

    @media (min-width: 980px) {
      body { padding: 26px; }
      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 22px;
      }
      .title-wrap h1 { font-size: clamp(38px, 5vw, 52px); }
      .title-wrap p { font-size: 16px; }
      button:hover { transform: translateY(-1px); }
      .records {
        max-height: 560px;
        overflow: auto;
        padding-right: 4px;
      }
      .amount { font-size: 19px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-wrap">
        <h1>姆姆國財政基金</h1>
        <p>記錄兩個人一起存進去的錢、共同支出、目前剩餘金額。</p>
      </div>
    </header>

    <section class="summary-grid">
      <div class="card mini-card balance-card">
        <div class="label">目前剩餘</div>
        <div class="value" id="balance">$-2,133</div>
        <div class="sub">共同戶頭可用金額</div>
        <div class="cloud-status ok" id="cloudStatus">已同步雲端</div>
        <div class="balance-actions">
          <button class="btn-primary balance-action" id="quickIncomeBtn" type="button">＋ 存入</button>
          <button class="btn-primary balance-action" id="expenseToggleBtn" type="button">－ 支出</button>
        </div>
      </div>
    </section>

    <div class="income-panel" id="incomePanel">
      <section class="card income-modal">
        <div class="modal-title-row">
          <h2>新增存入</h2>
          <button class="modal-close" id="incomeCloseBtn" type="button">關閉</button>
        </div>

        <form id="incomeForm">
          <div class="form-grid">
            <div class="field">
              <label for="incomeDate">日期</label>
              <input type="date" id="incomeDate" required="">
            </div>
            <div class="field">
              <label for="incomeAmount">金額</label>
              <input type="number" id="incomeAmount" min="1" step="1" placeholder="例如 3000" required="">
            </div>
          </div>
          <button class="btn-primary" type="submit">加入存入</button>
        </form>
      </section>
    </div>

    <div class="expense-panel" id="expensePanel">
      <section class="card expense-modal">
        <div class="modal-title-row">
          <h2>新增支出</h2>
          <button class="modal-close" id="expenseCloseBtn" type="button">關閉</button>
        </div>

        <form id="recordForm">
          <div class="form-grid">
          <div class="field">
            <label for="date">日期</label>
            <input type="date" id="date" required="">
          </div>
          <div class="field">
            <label for="amountInput">金額</label>
            <input type="number" id="amountInput" min="1" step="1" placeholder="例如 3000" required="">
          </div>
          <div class="field full">
            <label for="title">項目名稱</label>
            <input type="text" id="title" placeholder="例如：晚餐、衛生紙、停車費" required="">
          </div>
          <div class="field full">
            <label for="photoInput">照片</label>
            <input type="file" id="photoInput" accept="image/*">
            <div class="photo-preview-wrap" id="photoPreviewWrap">
              <img id="photoPreview" class="photo-preview" alt="照片預覽">
              <div class="preview-note">已選擇照片，送出後會附在這筆支出紀錄裡。</div>
            </div>
          </div>
          <div class="field full">
            <label for="note">備註</label>
            <textarea id="note" placeholder="可寫用途、地點、明細等"></textarea>
          </div>
          </div>
          <button class="btn-primary" type="submit">加入支出</button>
        </form>
      </section>
    </div>

    <section class="card">
      <div class="section-title">
        <h2>所有紀錄</h2>
      </div>
      <div class="toolbar">
        <input type="search" id="searchInput" placeholder="搜尋項目、備註...">
        <select id="typeFilter">
          <option value="all">全部類型</option>
          <option value="income">只看存入</option>
          <option value="expense">只看支出</option>
        </select>
      </div>
      <div id="records" class="records">
        <article class="record">
          <div class="record-content has-photo">
            <div class="record-main">
              <div class="record-title">
                <span>的</span>
                <span class="badge expense">支出</span>
                <button class="photo-add-btn" type="button" onclick="window.chooseRecordPhoto('a5770165-784a-4b3e-bd8c-82925bbf23fd')">換圖</button><input class="hidden" type="file" id="photoFill_a5770165-784a-4b3e-bd8c-82925bbf23fd" accept="image/*" onchange="window.fillRecordPhoto('a5770165-784a-4b3e-bd8c-82925bbf23fd', this)">
              </div>
              <div class="record-meta">
                2026-05-13・無備註
              </div>
              <div class="record-bottom">
                <div class="amount minus">
                  -$2,233
                </div>
                <div class="record-actions">
                  <button class="tiny-btn" type="button" data-delete-id="a5770165-784a-4b3e-bd8c-82925bbf23fd">刪除</button>

    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose" type="button">關閉</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      set,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    // 公開 Firebase Realtime Database：yikai-shared
    // 注意：公開可讀可寫，知道網址的人都能查看與編輯。
    const firebaseConfig = {
      apiKey: "AIzaSyAvo2-aTHpDdnzNvD4aOp5o16KBQaR9OlU",
      authDomain: "yikai-shared.firebaseapp.com",
      databaseURL: "https://yikai-shared-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "yikai-shared",
      storageBucket: "yikai-shared.firebasestorage.app",
      messagingSenderId: "798549808274",
      appId: "1:798549808274:web:ef37e35a097fd46405c24b"
    };

    const CLOUD_PATH = 'public/coupleAccount';
    const STORAGE_KEY = 'couple_shared_account_records_v2_photo';
    const LEGACY_STORAGE_KEYS = ['couple_shared_account_records_v1'];
    const incomeTitle = '共同存入';

    let records = [];
    let pendingPhotoData = '';
    let db = null;
    let recordsRef = null;
    let cloudReady = false;
    let isApplyingCloudData = false;
    let cloudSaveTimer = null;
    let lastCloudJson = '';

    const $ = (id) => document.getElementById(id);
    const money = (n) => '$' + Math.round(Number(n || 0)).toLocaleString('zh-TW');

    function safeId() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return `${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function normalizeRecord(record = {}) {
      const type = record.type === 'income' ? 'income' : 'expense';
      const amount = Math.max(0, Number(record.amount || 0));
      return {
        id: String(record.id || safeId()),
        type,
        date: record.date || todayString(),
        amount,
        title: String(record.title || (type === 'income' ? incomeTitle : '支出')),
        note: String(record.note || ''),
        photo: String(record.photo || ''),
        createdAt: Number(record.createdAt || Date.now())
      };
    }

    function normalizeRecords(list) {
      return Array.isArray(list)
        ? list.map(normalizeRecord).filter(r => r.amount > 0)
        : [];
    }

    function setCloudStatus(text, state = '') {
      const el = $('cloudStatus');
      if (!el) return;
      el.textContent = text;
      el.classList.remove('ok', 'warn', 'error');
      if (state) el.classList.add(state);
    }

    function loadLocalRecords() {
      const current = localStorage.getItem(STORAGE_KEY);
      if (current) {
        try { return JSON.parse(current); } catch (e) {}
      }
      for (const key of LEGACY_STORAGE_KEYS) {
        const legacy = localStorage.getItem(key);
        if (legacy) {
          try { return normalizeRecords(JSON.parse(legacy)); } catch (e) {}
        }
      }
      return [];
    }

    function isFirebaseConfigured() {
      return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('PASTE_') &&
             firebaseConfig.databaseURL && !firebaseConfig.databaseURL.includes('PASTE_');
    }

    function todayString() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function save() {
      records = normalizeRecords(records);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));

      if (!cloudReady || !recordsRef || isApplyingCloudData) return;

      const currentJson = JSON.stringify(records);
      if (currentJson === lastCloudJson) return;

      clearTimeout(cloudSaveTimer);
      setCloudStatus('同步中...', 'warn');

      cloudSaveTimer = setTimeout(() => {
        set(recordsRef, {
          updatedAt: serverTimestamp(),
          records
        }).then(() => {
          lastCloudJson = currentJson;
          setCloudStatus('已同步雲端', 'ok');
        }).catch((err) => {
          console.error(err);
          setCloudStatus('雲端同步失敗，已先存本機', 'error');
        });
      }, 350);
    }

    function calc() {
      const income = records.filter(r => r.type === 'income').reduce((s, r) => s + Number(r.amount), 0);
      const expense = records.filter(r => r.type === 'expense').reduce((s, r) => s + Number(r.amount), 0);
      return { income, expense, balance: income - expense };
    }

    function renderSummary() {
      const c = calc();
      $('balance').textContent = money(c.balance);
    }

    function renderRecords() {
      const q = $('searchInput').value.trim().toLowerCase();
      const type = $('typeFilter').value;

      const filtered = records
        .filter(r => type === 'all' || r.type === type)
        .filter(r => {
          const text = `${r.title} ${r.note || ''}`.toLowerCase();
          return !q || text.includes(q);
        })
        .sort((a,b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);

      if (!filtered.length) {
        $('records').innerHTML = '<div class="empty">還沒有任何紀錄</div>';
        return;
      }

      $('records').innerHTML = filtered.map(r => `
        <article class="record">
          <div class="record-content ${r.photo ? 'has-photo' : ''}">
            <div class="record-main">
              <div class="record-title">
                <span>${escapeHtml(r.title)}</span>
                <span class="badge ${r.type}">${r.type === 'income' ? '存入' : '支出'}</span>
                ${r.type === 'expense' ? `<button class="photo-add-btn" type="button" onclick="window.chooseRecordPhoto('${r.id}')">${r.photo ? '換圖' : '補圖'}</button><input class="hidden" type="file" id="photoFill_${r.id}" accept="image/*" onchange="window.fillRecordPhoto('${r.id}', this)" />` : ''}
              </div>
              <div class="record-meta">
                ${r.date}・${escapeHtml(r.note || '無備註')}
              </div>
              <div class="record-bottom">
                <div class="amount ${r.type === 'income' ? 'plus' : 'minus'}">
                  ${r.type === 'income' ? '+' : '-'}${money(r.amount)}
                </div>
                <div class="record-actions">
                  <button class="tiny-btn" type="button" data-delete-id="${r.id}">刪除</button>
                </div>
              </div>
            </div>
            ${r.photo ? `<div class="record-photo-wrap"><img src="${r.photo}" class="record-photo" alt="${escapeHtml(r.title)}" title="點我放大" onclick="window.openLightbox('${encodeURIComponent(r.photo)}')" /></div>` : ''}
          </div>
        </article>
      `).join('');
    }

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderAll() {
      save();
      renderSummary();
      renderRecords();
    }

    function initCloud() {
      records = loadLocalRecords();
      renderAll();

      if (!isFirebaseConfigured()) {
        setCloudStatus('尚未設定 Firebase，目前只存本機', 'warn');
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        db = getDatabase(app);
        recordsRef = ref(db, CLOUD_PATH);
        cloudReady = true;
        setCloudStatus('雲端連線中...', 'warn');

        onValue(recordsRef, (snapshot) => {
          const data = snapshot.val();
          isApplyingCloudData = true;

          if (data && Array.isArray(data.records)) {
            records = normalizeRecords(data.records);
            lastCloudJson = JSON.stringify(records);
            localStorage.setItem(STORAGE_KEY, lastCloudJson);
            renderSummary();
            renderRecords();
            setCloudStatus('已同步雲端', 'ok');
            isApplyingCloudData = false;
            return;
          }

          const localRecords = loadLocalRecords();
          records = localRecords;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
          renderSummary();
          renderRecords();
          isApplyingCloudData = false;

          if (records.length) {
            setCloudStatus('建立雲端資料中...', 'warn');
            set(recordsRef, {
              updatedAt: serverTimestamp(),
              records
            }).then(() => {
              lastCloudJson = JSON.stringify(records);
              setCloudStatus('已同步雲端', 'ok');
            }).catch((err) => {
              console.error(err);
              setCloudStatus('雲端建立失敗，已先存本機', 'error');
            });
          } else {
            lastCloudJson = JSON.stringify(records);
            setCloudStatus('已連線，尚無資料', 'ok');
          }
        }, (err) => {
          console.error(err);
          cloudReady = false;
          records = loadLocalRecords();
          renderAll();
          setCloudStatus('雲端讀取失敗，已先用本機資料', 'error');
        });
      } catch (err) {
        console.error(err);
        cloudReady = false;
        setCloudStatus('Firebase 設定錯誤，目前只存本機', 'error');
      }
    }

    function toggleExpensePanel(forceOpen) {
      const panel = $('expensePanel');
      const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : !panel.classList.contains('show');
      panel.classList.toggle('show', shouldOpen);
      document.body.style.overflow = shouldOpen ? 'hidden' : '';
    }

    async function resizeImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxSize = 900;
            let { width, height } = img;
            if (width > height && width > maxSize) {
              height = Math.round(height * (maxSize / width));
              width = maxSize;
            } else if (height >= width && height > maxSize) {
              width = Math.round(width * (maxSize / height));
              height = maxSize;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.72));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function handlePhotoInput() {
      const file = $('photoInput').files[0];
      if (!file) {
        pendingPhotoData = '';
        $('photoPreviewWrap').classList.remove('show');
        $('photoPreview').removeAttribute('src');
        return;
      }

      try {
        pendingPhotoData = await resizeImage(file);
        $('photoPreview').src = pendingPhotoData;
        $('photoPreviewWrap').classList.add('show');
      } catch (err) {
        pendingPhotoData = '';
        $('photoPreviewWrap').classList.remove('show');
        alert('照片讀取失敗，請再試一次');
      }
    }

    function clearPhotoInput() {
      pendingPhotoData = '';
      $('photoInput').value = '';
      $('photoPreview').removeAttribute('src');
      $('photoPreviewWrap').classList.remove('show');
    }

    function toggleIncomePanel(forceOpen) {
      const panel = $('incomePanel');
      const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : !panel.classList.contains('show');
      panel.classList.toggle('show', shouldOpen);
      document.body.style.overflow = shouldOpen ? 'hidden' : '';

      if (shouldOpen) {
        $('incomeDate').value = $('incomeDate').value || todayString();
        setTimeout(() => $('incomeAmount').focus(), 80);
      }
    }

    function addIncomeRecord(date, amount) {
      records.push({
        id: safeId(),
        type: 'income',
        date: date || todayString(),
        amount,
        title: incomeTitle,
        note: '',
        photo: '',
        createdAt: Date.now()
      });

      renderAll();
    }

    window.deleteRecord = function(id) {
      const target = records.find(r => String(r.id) === String(id));
      if (!target) {
        alert('找不到這筆紀錄，請重新整理後再試一次');
        return;
      }

      const label = target.type === 'income' ? '存入' : '支出';
      const amountText = money(target.amount);
      if (!confirm(`確定要刪除這筆${label}紀錄 ${amountText} 嗎？`)) return;

      records = records.filter(r => String(r.id) !== String(id));
      renderAll();
    }

    window.chooseRecordPhoto = function(id) {
      const input = document.getElementById(`photoFill_${id}`);
      if (input) input.click();
    }

    window.fillRecordPhoto = async function(id, input) {
      const file = input.files && input.files[0];
      if (!file) return;

      try {
        const photoData = await resizeImage(file);
        records = records.map(r => r.id === id ? { ...r, photo: photoData } : r);
        renderAll();
      } catch (err) {
        alert('補圖失敗，請再試一次');
      } finally {
        input.value = '';
      }
    }

    window.openLightbox = function(encodedSrc) {
      $('lightboxImage').src = decodeURIComponent(encodedSrc);
      $('lightbox').classList.add('show');
    }

    function closeLightbox() {
      $('lightbox').classList.remove('show');
      $('lightboxImage').removeAttribute('src');
    }

    $('incomeForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const amount = Number($('incomeAmount').value);
      if (!amount || amount <= 0) return alert('金額要大於 0');

      addIncomeRecord($('incomeDate').value, amount);
      $('incomeForm').reset();
      $('incomeDate').value = todayString();
      toggleIncomePanel(false);
    });

    $('recordForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const amount = Number($('amountInput').value);
      if (!amount || amount <= 0) return alert('金額要大於 0');

      try {
        records.push({
          id: safeId(),
          type: 'expense',
          date: $('date').value,
          amount,
          title: $('title').value.trim(),
          note: $('note').value.trim(),
          photo: pendingPhotoData,
          createdAt: Date.now()
        });
      } catch (err) {
        alert('新增失敗，請再試一次');
        return;
      }

      $('recordForm').reset();
      $('date').value = todayString();
      clearPhotoInput();
      renderAll();
      toggleExpensePanel(false);
    });

    $('photoInput').addEventListener('change', handlePhotoInput);

    ['searchInput', 'typeFilter'].forEach(id => {
      $(id).addEventListener('input', renderRecords);
      $(id).addEventListener('change', renderRecords);
    });

    $('records').addEventListener('click', (e) => {
      const deleteBtn = e.target.closest('[data-delete-id]');
      if (!deleteBtn) return;
      e.preventDefault();
      e.stopPropagation();
      window.deleteRecord(deleteBtn.dataset.deleteId);
    });

    $('quickIncomeBtn').addEventListener('click', () => toggleIncomePanel(true));
    $('incomeCloseBtn').addEventListener('click', () => toggleIncomePanel(false));
    $('incomePanel').addEventListener('click', (e) => {
      if (e.target === $('incomePanel')) toggleIncomePanel(false);
    });
    $('expenseToggleBtn').addEventListener('click', () => toggleExpensePanel(true));
    $('expenseCloseBtn').addEventListener('click', () => toggleExpensePanel(false));
    $('expensePanel').addEventListener('click', (e) => {
      if (e.target === $('expensePanel')) toggleExpensePanel(false);
    });
    $('lightboxClose').addEventListener('click', closeLightbox);
    $('lightbox').addEventListener('click', (e) => {
      if (e.target === $('lightbox')) closeLightbox();
    });

    $('date').value = todayString();
    $('incomeDate').value = todayString();
    initCloud();
  </script>


</body></html>
